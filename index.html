<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.block {
  display: block;

/*  background-color: #04AA6D;*/
  background-color:#b999ff;

  padding: 14px 28px;
  font-size: 20px;
  cursor: pointer;
  text-align: center;
}

.block:hover {
  background-color:#ddd;
  border:2px solid #04AA6D;
  color: black;
}

div{
background-color:#ddd;
position:sticky;
top:0px;
}
h3{
display:inline-block;
top:0px;
}

.refreshbtn{
float:right;
border:none;
background-color:inherit;
/*margin-left: 183px;*/

font-size:16px;
cursor: pointer;
display:inline-block;
}
.container{
display:flex;

/*border:2px solid #04AA6D;*/
}
.container>div{
width:60px;
margin:5px;
text-align:center;
line-height:10px;
}
</style>
